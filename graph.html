<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Galgame 连线图</title>
    <link rel="stylesheet" href="vis-network_min.css">
    <link rel="stylesheet" href="graph.css">
</head>
<body>

    <!-- 顶部导航栏 -->
    <div id="header">
        <h1>📊 分支连线图</h1>
        <div class="buttons">
            <button class="btn-secondary" onclick="loadFromEditor()">📥 从编辑器加载</button>
            <button class="btn-secondary" onclick="loadFromFile()">📂 导入 JSON 文件</button>
            <button onclick="fitGraph()">🔍 适应窗口</button>
            <button class="btn-secondary" onclick="goBack()">← 返回编辑器</button>
        </div>
    </div>

    <!-- 连线图区域 -->
    <div id="graph-container">
        <div id="graph"></div>
        <div id="empty-tip">
            <div style="font-size:48px;">📭</div>
            <p>暂无数据，请点击上方按钮加载</p>
        </div>
    </div>

    <!-- 底部信息栏 -->
    <div id="footer">
        <div>
            <span>节点数: <b id="node-count">0</b></span>
            <span>连线数: <b id="edge-count">0</b></span>
        </div>
        <div>💡 点击节点查看详情 · 滚轮缩放 · 拖拽移动</div>
    </div>

    <script src="vis-network_min.js"></script>
    <script src="graph.js"></script>
</body>
</html>
