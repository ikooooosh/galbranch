<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Galgame Branch</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- 顶部标题栏 -->
    <div id="header">
        <h1>🎮 Galgame 分支编辑器</h1>
    </div>

    <!-- 中间主体区（左右两块） -->
    <div id="main">
        <!-- 左侧：节点列表 -->
        <div id="node-list">
            <h3>节点列表</h3>
            <p>这里放所有场景节点</p>
        </div>

        <!-- 右侧：编辑区 -->
        <div id="editor">
            <h3>节点编辑</h3>
            <p>这里编辑选中节点的内容</p>
        </div>
    </div>

    <!-- 底部工具栏 -->
    <div id="toolbar">
        <button onclick="addNode()">新增节点</button>
        <button onclick="saveToFile()">导出到文件</button>
        <button onclick="loadFromFile()">导入文件</button>
        <button onclick="window.location.href='graph.html'">📊 打开连线图</button>
    </div>

    <!-- 引入外部 JS 文件 -->
    <script src="app.js"></script>
</body>
</html>
